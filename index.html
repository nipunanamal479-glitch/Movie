<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>SL CINEMA PRO</title>
    <script src="Data.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flower-loader { width: 60px; height: 60px; position: relative; animation: rotate 1.5s linear infinite; }
        .petal { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .petal::after { content: ''; display: block; width: 15px; height: 15px; background: #e50914; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 10px #e50914; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .bubble-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; }
        .bubble-card:hover { border: 1px solid #e50914; transform: scale(1.05); }

        .slow-popup { transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; transform: scale(0.5); visibility: hidden; }
        .slow-popup.show { opacity: 1; transform: scale(1); visibility: visible; }
        
        /* Slow Download Button Effect */
        .btn-download { transition: all 1.5s ease-in-out; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState("");
            const [loading, setLoading] = useState(true);
            const [isOpen, setIsOpen] = useState(false);

            useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);

            if (loading) return (
                <div className="h-screen flex flex-col justify-center items-center bg-black">
                    <div className="flower-loader">
                        {[...Array(8)].map((_, i) => <div key={i} className="petal" style={{ transform: `rotate(${i * 45}deg)` }}></div>)}
                    </div>
                    <p className="mt-8 text-red-600 font-bold tracking-widest">SL CINEMA LOADING...</p>
                </div>
            );

            const filtered = (window.movies || []).filter(m => m.title.toLowerCase().includes(search.toLowerCase()));

            return (
                <div>
                    <div className="bg-black p-8 border-b border-red-900 flex justify-between items-center px-10">
                        <h1 className="text-4xl font-black text-red-600 tracking-tighter uppercase">SL CINEMA</h1>
                        
                        {/* Search Icon & Box - දකුණු පැත්තට */}
                        <div className="flex items-center gap-4">
                            <input 
                                className={`bg-[#111] border border-red-900 rounded-full px-6 py-3 outline-none transition-all duration-700 ease-in-out ${isOpen ? 'w-64 opacity-100' : 'w-0 opacity-0 px-0'}`}
                                placeholder="සෙවීම..." 
                                onChange={(e) => setSearch(e.target.value)} 
                            />
                            <button className="text-red-600 text-3xl transition-transform hover:scale-110" onClick={() => setIsOpen(!isOpen)}>🔍</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-8 max-w-6xl mx-auto p-10">
                        {filtered.map(m => (
                            <div key={m.id} className="bubble-card p-6 rounded-3xl cursor-pointer min-h-[300px]" onClick={() => setSelected(m)}>
                                <img src={m.image} className="w-full h-56 object-cover rounded-2xl" onError={(e) => e.target.src='https://via.placeholder.com/300'} />
                                <h3 className="text-center mt-6 font-bold text-lg">{m.title}</h3>
                            </div>
                        ))}
                    </div>

                    {selected && (
                        <div className={`fixed inset-0 bg-black/95 flex justify-center items-center p-6 z-50 slow-popup show`} onClick={() => setSelected(null)}>
                            <div className="bg-[#111] p-10 rounded-[3rem] w-full max-w-md border border-red-900 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <img src={selected.image} className="w-full rounded-3xl h-64 object-cover" />
                                <h2 className="text-3xl font-bold mt-6">{selected.title}</h2>
                                <p className="text-gray-400 mt-3 text-lg">{selected.description}</p>
                                {/* Slow Download Button */}
                                <a href={selected.link} className="btn-download block w-full mt-10 bg-red-600 py-5 rounded-2xl font-black text-center hover:bg-white hover:text-red-600">Download Now</a>
                                <button className="w-full mt-5 text-gray-500 hover:text-white" onClick={() => setSelected(null)}>Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
