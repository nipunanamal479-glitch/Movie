<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLCinema - Movies</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Navbar & Search */
        .navbar { background: #111; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-container { background: #222; padding: 10px; border-radius: 20px; }
        .search-container input { background: transparent; border: none; color: #fff; outline: none; }

        /* Movie Grid */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        
        /* Popup Animation */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .download-btn { display: block; background: #e50914; padding: 15px; color: #fff; text-decoration: none; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2 onclick="location.reload()" style="cursor:pointer;">SLCinema</h2>
        <div class="search-container">
            <input type="text" placeholder="Search Movies...">
        </div>
    </div>

    <div class="container" id="movie-list"></div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer;">&times;</span>
            <img id="m-img" src="" style="width:100%; border-radius:10px;">
            <h2 id="m-title"></h2>
            <a id="m-link" href="#" class="download-btn">Download Now</a>
        </div>
    </div>

    <script src="Data.js"></script>
    <script>
        const list = document.getElementById('movie-list');
        movies.forEach(m => {
            list.innerHTML += `
                <div class="card" onclick="openMovie(${m.id})">
                    <img src="${m.image}">
                    <h3 style="font-size:14px; padding:5px;">${m.title}</h3>
                </div>`;
        });

        function openMovie(id) {
            const m = movies.find(x => x.id == id);
            document.getElementById("m-img").src = m.image;
            document.getElementById("m-title").innerText = m.title;
            document.getElementById("m-link").href = m.link;
            document.getElementById("myModal").style.display = "flex";
        }
        function closeModal() { document.getElementById("myModal").style.display = "none"; }
    </script>
</body>
</html>
