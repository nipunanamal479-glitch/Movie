<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLCinema</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .navbar { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; }
        .menu a { color: #fff; margin-left: 15px; text-decoration: none; font-size: 14px; }
        
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        
        /* Popup (Modal) Style */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; animation: zoom 0.3s; }
        @keyframes zoom { from { transform: scale(0.8); } to { transform: scale(1); } }
        .btn { display: block; background: #ff0000; color: #fff; padding: 12px; text-decoration: none; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>SLCinema</h2>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Latest</a>
        </div>
    </div>

    <div class="container" id="movie-list"></div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
            <img id="modal-img" src="" style="width:100%; height:300px; object-fit:cover; border-radius:10px;">
            <h2 id="modal-title"></h2>
            <a id="modal-link" href="#" class="btn">Download Now</a>
        </div>
    </div>

    <script src="Data.js"></script>
    <script>
        const list = document.getElementById('movie-list');
        const modal = document.getElementById('myModal');

        movies.forEach(m => {
            list.innerHTML += `
                <div class="card" onclick="openMovie(${m.id})">
                    <img src="${m.image}">
                    <p>${m.title}</p>
                </div>`;
        });

        function openMovie(id) {
            const m = movies.find(x => x.id == id);
            document.getElementById("modal-img").src = m.image;
            document.getElementById("modal-title").innerText = m.title;
            document.getElementById("modal-link").href = m.link;
            modal.style.display = "flex";
        }

        function closeModal() { modal.style.display = "none"; }
    </script>
</body>
</html>
