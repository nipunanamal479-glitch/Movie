<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLCinema</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .navbar { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; }
        .menu a { color: #fff; margin-left: 15px; text-decoration: none; font-size: 14px; }
        .container { padding: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        .btn { display: block; background: #ff0000; color: #fff; padding: 12px; text-align: center; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        
        /* මූවි පිටුව පෙන්වන style එක */
        #movie-page { display: none; padding: 20px; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>SLCinema</h2>
        <div class="menu">
            <a href="#" onclick="showHome()">Home</a>
            <a href="#">Latest</a>
            <a href="#">Categories</a>
        </div>
    </div>

    <!-- ප්‍රධාන පිටුව -->
    <div class="container" id="home-page">
        <div id="movie-list"></div>
    </div>

    <!-- මූවි විස්තර පිටුව -->
    <div id="movie-page">
        <button onclick="showHome()" style="background:none; color:#fff; border:1px solid #fff; padding:5px;">Back</button>
        <h2 id="m-title"></h2>
        <img id="m-img" src="" style="width:100%; border-radius:10px;">
        <p>මේ මූවි එකේ විස්තර මෙතනින් පෙන්වන්න පුළුවන්.</p>
        <a id="m-link" href="#" class="btn">Download Now</a>
    </div>

    <script src="Data.js"></script>
    <script>
        const list = document.getElementById('movie-list');
        const homePage = document.getElementById('home-page');
        const moviePage = document.getElementById('movie-page');

        function showHome() {
            homePage.style.display = 'block';
            moviePage.style.display = 'none';
        }

        function openMovie(id) {
            const m = movies.find(x => x.id == id);
            document.getElementById('m-title').innerText = m.title;
            document.getElementById('m-img').src = m.image;
            document.getElementById('m-link').href = m.link;
            homePage.style.display = 'none';
            moviePage.style.display = 'block';
        }

        movies.forEach(m => {
            list.innerHTML += `
                <div class="card">
                    <img src="${m.image}">
                    <h3>${m.title}</h3>
                    <a href="#" class="btn" onclick="openMovie(${m.id})">Download</a>
                </div>`;
        });
    </script>
</body>
</html>
