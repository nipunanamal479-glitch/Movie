<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>SL CINEMA PRO</title>
    <script src="Data.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flower-loader { width: 60px; height: 60px; position: relative; animation: rotate 1.5s linear infinite; }
        .petal { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .petal::after { content: ''; display: block; width: 15px; height: 15px; background: #e50914; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 10px #e50914; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .bubble-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; }
        .bubble-card:hover { border: 1px solid #e50914; transform: translateY(-8px); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2); }
        
        .popup-overlay { transition: 0.5s; opacity: 0; visibility: hidden; }
        .popup-overlay.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [selected, setSelected] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // දත්ත තියෙනවද කියලා බලලා පස්සේ load කරන්න
                const timer = setTimeout(() => setLoading(false), 1500);
                return () => clearTimeout(timer);
            }, []);

            if (loading) return (
                <div className="h-screen flex flex-col justify-center items-center bg-black">
                    <div className="flower-loader">
                        {[...Array(8)].map((_, i) => <div key={i} className="petal" style={{ transform: `rotate(${i * 45}deg)` }}></div>)}
                    </div>
                    <p className="mt-8 text-red-600 font-bold animate-pulse">සිනමාව ලෝඩ් වෙමින්...</p>
                </div>
            );

            return (
                <div className="p-4">
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl mx-auto mt-10">
                        {(window.movies || []).map(m => (
                            <div key={m.id} className="bubble-card p-4 rounded-2xl cursor-pointer" onClick={() => setSelected(m)}>
                                {/* පින්තූරේ අවුලක් වුණොත් background එක පේනවා */}
                                <img src={m.image} className="w-full h-40 object-cover rounded-xl bg-gray-800" onError={(e) => e.target.src='https://via.placeholder.com/300/000000/FFFFFF?text=No+Image'} />
                                <h3 className="text-center mt-4 font-bold text-sm">{m.title}</h3>
                            </div>
                        ))}
                    </div>

                    {selected && (
                        <div className={`fixed inset-0 bg-black/95 flex justify-center items-center p-6 z-50 popup-overlay show`} onClick={() => setSelected(null)}>
                            <div className="bg-[#111] p-6 rounded-3xl w-full max-w-sm border border-red-900" onClick={e => e.stopPropagation()}>
                                <img src={selected.image} className="w-full rounded-2xl" />
                                <h2 className="text-2xl font-bold mt-4">{selected.title}</h2>
                                <p className="text-gray-400 mt-2">{selected.description}</p>
                                <button className="w-full mt-6 bg-red-600 py-3 rounded-xl font-bold" onClick={() => setSelected(null)}>close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
