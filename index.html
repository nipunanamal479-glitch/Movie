<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLCinema</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        
        /* Cinesubz වගේ Card එක */
        .card { position: relative; background: #111; border-radius: 5px; overflow: hidden; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 8px; }
        .info h3 { font-size: 13px; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* අර උඩ තියෙන Badge එක */
        .badge { position: absolute; top: 5px; left: 5px; background: #28a745; font-size: 10px; padding: 3px 6px; border-radius: 3px; }
        .rating { position: absolute; top: 5px; right: 5px; background: #ffc107; color: #000; font-size: 10px; padding: 3px 6px; border-radius: 3px; font-weight: bold; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 15% auto; padding: 20px; width: 80%; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="container" id="movie-list"></div>

    <div id="myModal" class="modal" onclick="closeModal()">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <a id="modal-link" href="#" style="color:red;">Download Here</a>
        </div>
    </div>

    <script src="Data.js"></script>
    <script>
        const list = document.getElementById('movie-list');
        movies.forEach(m => {
            list.innerHTML += `
                <div class="card" onclick="openMovie(${m.id})">
                    <span class="badge">${m.episodes}</span>
                    <span class="rating">★ ${m.rating}</span>
                    <img src="${m.image}">
                    <div class="info">
                        <h3>${m.title}</h3>
                    </div>
                </div>`;
        });

        function openMovie(id) {
            const m = movies.find(x => x.id == id);
            document.getElementById("modal-title").innerText = m.title;
            document.getElementById("modal-link").href = m.link;
            document.getElementById("myModal").style.display = "block";
        }
        function closeModal() { document.getElementById("myModal").style.display = "none"; }
    </script>
</body>
</html>
