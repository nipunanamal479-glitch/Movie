<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>SL CINEMA PRO</title>
    <script src="Data.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flower-loader { width: 60px; height: 60px; position: relative; animation: rotate 1.5s linear infinite; }
        .petal { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .petal::after { content: ''; display: block; width: 15px; height: 15px; background: #e50914; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 10px #e50914; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .bubble-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; }
        .bubble-card:hover { border: 1px solid #e50914; transform: translateY(-8px); }

        /* Slow Bounce Popup */
        .slow-popup { transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; transform: scale(0.5); visibility: hidden; }
        .slow-popup.show { opacity: 1; transform: scale(1); visibility: visible; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState("");
            const [loading, setLoading] = useState(true);
            const [isOpen, setIsOpen] = useState(false);

            useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);

            if (loading) return (
                <div className="h-screen flex flex-col justify-center items-center bg-black">
                    <div className="flower-loader">
                        {[...Array(8)].map((_, i) => <div key={i} className="petal" style={{ transform: `rotate(${i * 45}deg)` }}></div>)}
                    </div>
                    <p className="mt-8 text-red-600 font-bold tracking-widest">SL CINEMA LOADING...</p>
                </div>
            );

            const filtered = (window.movies || []).filter(m => m.title.toLowerCase().includes(search.toLowerCase()));

            return (
                <div>
                    <div className="bg-black p-8 text-center border-b border-red-900">
                        <h1 className="text-4xl font-black text-red-600 tracking-tighter uppercase">SL CINEMA</h1>
                        <input className="mt-6 w-full max-w-sm bg-[#111] border border-red-900 rounded-full px-6 py-3 outline-none" placeholder="සෙවීම..." onChange={(e) => setSearch(e.target.value)} />
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl mx-auto p-6">
                        {filtered.map(m => (
                            <div key={m.id} className="bubble-card p-4 rounded-2xl cursor-pointer" onClick={() => setSelected(m)}>
                                <img src={m.image} className="w-full h-40 object-cover rounded-xl" onError={(e) => e.target.src='https://via.placeholder.com/300'} />
                                <h3 className="text-center mt-4 font-bold text-sm">{m.title}</h3>
                            </div>
                        ))}
                    </div>

                    <div className={`fixed inset-0 bg-black/90 flex justify-center items-center p-6 z-50 slow-popup ${selected ? 'show' : ''}`} onClick={() => setSelected(null)}>
                        {selected && (
                            <div className="bg-[#111] p-8 rounded-3xl w-full max-w-sm border border-red-900 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <img src={selected.image} className="w-full rounded-2xl" />
                                <h2 className="text-2xl font-bold mt-4">{selected.title}</h2>
                                <p className="text-gray-400 mt-2">{selected.description}</p>
                                {/* Slow Download Button */}
                                <a href={selected.link} className="block w-full mt-8 bg-red-600 py-4 rounded-xl font-black text-center transition-all duration-700 hover:scale-105 hover:bg-red-700">Download Now</a>
                                <button className="w-full mt-4 text-gray-500 hover:text-white" onClick={() => setSelected(null)}>Close</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
