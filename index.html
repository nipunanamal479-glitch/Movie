<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>SL CINEMA PRO</title>
    <!-- Data එක මුලින්ම load වෙන්න -->
    <script src="Data.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flower-loader { width: 50px; height: 50px; position: relative; animation: rotate 2s linear infinite; }
        .petal { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .petal::after { content: ''; display: block; width: 12px; height: 12px; background: #e50914; border-radius: 50%; margin: 0 auto; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .bubble-card { background: rgba(17, 17, 17, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s ease; }
        .bubble-card:hover { background: rgba(229, 9, 20, 0.1); border: 1px solid #e50914; box-shadow: 0 8px 32px 0 rgba(229, 9, 20, 0.3); transform: translateY(-5px); }

        .popup-overlay { transition: opacity 0.7s ease-in-out; opacity: 0; visibility: hidden; }
        .popup-overlay.show { opacity: 1; visibility: visible; }
        .popup-box { transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(0); }
        .popup-box.show { transform: scale(1); }
    </style>
</head>
<body class="bg-[#050505] text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState("");
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [showPopup, setShowPopup] = useState(false);
            const [movieData, setMovieData] = useState([]);

            useEffect(() => {
                // කෙලින්ම window.movies තියෙනවද බලනවා
                if (window.movies) {
                    setMovieData(window.movies);
                    setLoading(false);
                } else {
                    // නැත්නම් පොඩි වෙලාවක් බලන් ඉන්නවා
                    setTimeout(() => {
                        setMovieData(window.movies || []);
                        setLoading(false);
                    }, 500);
                }
            }, []);

            const openPopup = (m) => { setSelected(m); setTimeout(() => setShowPopup(true), 50); };
            const closePopup = () => { setShowPopup(false); setTimeout(() => setSelected(null), 700); };

            if (loading) return (
                <div className="h-screen flex justify-center items-center">
                    <div className="flower-loader">
                        {[...Array(8)].map((_, i) => <div key={i} className="petal" style={{ transform: `rotate(${i * 45}deg)` }}></div>)}
                    </div>
                </div>
            );

            const filtered = movieData.filter(m => m.title.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="min-h-screen">
                    <div className="bg-black p-6 text-center border-b border-red-600 text-red-600 text-3xl font-bold uppercase">SL CINEMA</div>
                    
                    <div className="flex justify-end p-4 items-center gap-3 max-w-4xl mx-auto">
                        <input className={`bg-gray-900 border border-red-600 text-white p-2 rounded-full transition-all duration-500 ${isSearchOpen ? 'w-48 px-4' : 'w-0 px-0 opacity-0'}`}
                            placeholder="සෙවීම..." onChange={(e) => setSearch(e.target.value)} />
                        <button className="text-red-600 text-2xl" onClick={() => setIsSearchOpen(!isSearchOpen)}>🔍</button>
                    </div>

                    <div className="grid grid-cols-3 gap-4 p-4 max-w-4xl mx-auto">
                        {filtered.map(m => (
                            <div key={m.id} className="bubble-card p-3 rounded-2xl cursor-pointer" onClick={() => openPopup(m)}>
                                <img src={m.image} className="w-full h-32 object-cover rounded-xl" />
                                <h3 className="text-center mt-2 text-xs font-semibold">{m.title}</h3>
                            </div>
                        ))}
                    </div>

                    <div className={`fixed inset-0 bg-black/90 flex justify-center items-center p-4 z-50 popup-overlay ${selected ? 'show' : ''}`} onClick={closePopup}>
                        {selected && (
                            <div className={`bg-[#1a1a1a] p-6 rounded-2xl w-full max-w-sm border border-red-600 popup-box ${showPopup ? 'show' : ''}`} onClick={e => e.stopPropagation()}>
                                <img src={selected.image} className="w-full rounded-lg" />
                                <h2 className="text-xl font-bold mt-4">{selected.title}</h2>
                                <p className="text-gray-400 mt-2 text-sm">{selected.description}</p>
                                <a href={selected.link} className="block bg-red-600 text-center p-3 rounded-lg mt-6 font-bold hover:shadow-[0_0_15px_#e50914] transition duration-700">Download Now</a>
                                <button className="w-full mt-3 text-gray-500" onClick={closePopup}>Close</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
