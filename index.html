<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL CINEMA</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; }
        .navbar { padding: 20px; background: #000; text-align: center; color: #e50914; font-size: 24px; font-weight: bold; }
        
        .search-container { padding: 15px 20px; background: #000; display: flex; justify-content: flex-end; align-items: center; }
        .search-box { 
            width: 0; padding: 0; border: none; border-radius: 20px; background: #111; color: white;
            transition: width 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55), padding 0.5s; overflow: hidden;
        }
        .search-box.active { width: 180px; padding: 10px 15px; border: 1px solid #e50914; margin-right: 10px; }
        .search-icon { font-size: 24px; cursor: pointer; color: #e50914; transition: 0.3s; }
        .search-icon:hover { transform: rotate(90deg) scale(1.2); }

        .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { 
            background: #111; border-radius: 10px; overflow: hidden; cursor: pointer;
            border: 1px solid #222; transition: 0.3s; animation: pulseMax 3s infinite;
        }
        @keyframes pulseMax { 0%, 100% { box-shadow: 0 0 10px rgba(229, 9, 20, 0.3); } 50% { box-shadow: 0 0 25px rgba(229, 9, 20, 0.6); } }
        .card:hover { animation: pulseGlowMax 1s infinite; border-color: #e50914; transform: scale(1.05); }
        @keyframes pulseGlowMax { 0%, 100% { box-shadow: 0 0 10px rgba(229, 9, 20, 0.4); } 50% { box-shadow: 0 0 40px rgba(229, 9, 20, 1); } }
        
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card h3 { text-align: center; font-size: 10px; margin: 5px 0; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .btn-download { display: block; background: #e50914; color: white; padding: 12px; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">SL CINEMA</div>
    
    <div class="search-container">
        <input type="text" class="search-box" placeholder="සෙවීම..." id="search" onkeyup="filterMovies()">
        <span class="search-icon" onclick="toggleSearch()">🔍</span>
    </div>

    <div class="container" id="movie-list"></div>

    <div id="myModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="m-img" src="" style="width:100%; border-radius:10px;">
            <h2 id="m-title"></h2>
            <p id="m-desc" style="color:#aaa;"></p>
            <a id="m-link" href="#" class="btn-download" download>Download</a>
        </div>
    </div>

    <script>
        // අලුත් මූවි එකක් එකතු කරන්න ඕනේ නම් මේ ලිස්ට් එකට පහළින් පේළියක් එකතු කරන්න
        const movies = [
            { "id": 1, "title": "යම රාජ සිරි Yamaraja Siri", "image": "https://via.placeholder.com/150", "description": "මේක යම රාජ සිරි මූවි එකේ විස්තරයයි.", "link": "#" },
            { "id": 2, "title": "වීදි පහන Veedi Pahana", "image": "https://via.placeholder.com/150", "description": "වීදි පහන මූවි එකේ විස්තරය.", "link": "#" }
        ];

        function toggleSearch() { document.getElementById('search').classList.toggle('active'); }

        // Fuzzy Search Logic
        function fuzzyMatch(str, query) {
            str = str.toLowerCase(); query = query.toLowerCase();
            let matrix = [];
            for(let i = 0; i <= str.length; i++) matrix[i] = [i];
            for(let j = 0; j <= query.length; j++) matrix[0][j] = j;
            for(let i = 1; i <= str.length; i++) {
                for(let j = 1; j <= query.length; j++) {
                    let cost = (str[i-1] == query[j-1]) ? 0 : 1;
                    matrix[i][j] = Math.min(matrix[i-1][j] + 1, matrix[i][j-1] + 1, matrix[i-1][j-1] + cost);
                }
            }
            return matrix[str.length][query.length] <= 3; 
        }

        function filterMovies() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = movies.filter(m => m.title.toLowerCase().includes(query) || fuzzyMatch(m.title, query));
            renderMovies(filtered);
        }

        const list = document.getElementById('movie-list');
        function renderMovies(arr) {
            list.innerHTML = "";
            arr.forEach(m => {
                list.innerHTML += `
                    <div class="card" onclick="openMovie(${m.id})">
                        <img src="${m.image}" alt="">
                        <h3>${m.title}</h3>
                    </div>`;
            });
        }

        function openMovie(id) {
            const m = movies.find(x => x.id == id);
            document.getElementById("m-title").innerText = m.title;
            document.getElementById("m-img").src = m.image;
            document.getElementById("m-desc").innerText = m.description;
            document.getElementById("m-link").href = m.link;
            document.getElementById("myModal").classList.add("active");
        }
        function closeModal() { document.getElementById("myModal").classList.remove("active"); }

        renderMovies(movies);
    </script>
</body>
</html>
