                <!DOCTYPE html>
<html lang="si">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0c0c0c; color: white; margin: 0; font-family: sans-serif; }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .flower { width: 50px; height: 50px; border: 5px solid #e50914; border-radius: 50%; border-top: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header { display: flex; justify-content: space-between; align-items: center; padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 25px; overflow: hidden; cursor: pointer; transition: 0.5s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 20px #e50914; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        
        #popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; opacity: 0; transition: 0.5s; }
        .popup-box { background: #111; padding: 35px; border-radius: 40px; width: 85%; text-align: center; border: 2px solid #e50914; transform: scale(0.9); transition: 0.5s; }
        .down-btn { display: block; background: #e50914; color: white; padding: 20px; margin-top: 20px; border-radius: 50px; text-decoration: none; font-size: 18px; }
    </style>
</head>
<body>

    <div id="loader"><div class="flower"></div><p style="margin-top:20px;">LOADING...</p></div>

    <header>
        <div id="brand-name" style="font-weight:900; font-size:24px;"></div>
        <div id="search-icon" style="cursor:pointer; font-size:28px;">🔍</div>
    </header>

    <div class="grid" id="grid"></div>

    <div id="popup" onclick="closePopup()">
        <div class="popup-box" id="popup-inner" onclick="event.stopPropagation()"></div>
    </div>

    <script src="Data.js"></script>
    <script>
        document.getElementById('brand-name').innerText = config.title;
        document.getElementById('brand-name').style.color = config.primaryColor;

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${m.img}"><div style="padding:15px; font-size:16px; font-weight:bold; text-align:center;">${m.title}</div>`;
                card.onclick = () => {
                    document.getElementById('popup').style.display = 'flex';
                    setTimeout(() => { document.getElementById('popup').style.opacity = '1'; document.querySelector('.popup-box').style.transform = 'scale(1)'; }, 50);
                    document.getElementById('popup-inner').innerHTML = `<h2>${m.title}</h2><p style="color:#aaa;">${m.desc}</p>
                                    <a href="${m.link}" class="down-btn">DOWNLOAD NOW</a>
                                    <div onclick="closePopup()" style="cursor:pointer; font-size:30px; margin-top:25px;">✕</div>`;
                };
                grid.appendChild(card);
            });
        }

        function closePopup() {
            document.getElementById('popup').style.opacity = '0';
            document.querySelector('.popup-box').style.transform = 'scale(0.9)';
            setTimeout(() => { document.getElementById('popup').style.display = 'none'; }, 500);
        }

        window.onload = () => setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500); render(); }, 1500);
    </script>
</body>
</html>
